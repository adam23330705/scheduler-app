<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f9a8d4"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="petal2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0abfc"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <linearGradient id="petal3" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fda4af"/>
      <stop offset="100%" style="stop-color:#fb7185"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="40" fill="url(#bg)"/>
  <!-- 花蕾主体 -->
  <g transform="translate(96,96)">
    <!-- 外层花瓣（未开） -->
    <ellipse cx="0" cy="-28" rx="22" ry="38" fill="url(#petal1)" opacity="0.9" transform="rotate(-30)"/>
    <ellipse cx="0" cy="-28" rx="22" ry="38" fill="url(#petal2)" opacity="0.9" transform="rotate(30)"/>
    <ellipse cx="0" cy="-28" rx="22" ry="38" fill="url(#petal3)" opacity="0.9" transform="rotate(0)"/>
    <!-- 内层花瓣 -->
    <ellipse cx="0" cy="-22" rx="16" ry="30" fill="#fde8ef" opacity="0.7" transform="rotate(-15)"/>
    <ellipse cx="0" cy="-22" rx="16" ry="30" fill="#fae8ff" opacity="0.7" transform="rotate(15)"/>
    <!-- 花心 -->
    <ellipse cx="0" cy="-12" rx="10" ry="18" fill="#fbbf24" opacity="0.8"/>
    <!-- 花茎 -->
    <rect x="-3" y="10" width="6" height="40" rx="3" fill="#22c55e"/>
    <!-- 叶子 -->
    <ellipse cx="-18" cy="30" rx="14" ry="7" fill="#22c55e" transform="rotate(-30 -18 30)"/>
    <ellipse cx="18" cy="36" rx="14" ry="7" fill="#16a34a" transform="rotate(30 18 36)"/>
  </g>
</svg>
