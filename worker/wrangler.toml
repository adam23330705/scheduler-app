# Cloudflare Worker 配置
name = "scheduler-api"
main = "src/index.js"
compatibility_date = "2024-12-01"

# D1 数据库绑定 - 部署前需要先创建数据库
# 运行: npx wrangler d1 create scheduler-db
# 然后将返回的 database_id 填入下方
[[d1_databases]]
binding = "DB"
database_name = "scheduler-db"
database_id = "YOUR_DATABASE_ID"

# 环境变量
[vars]
JWT_SECRET = "change-this-to-a-strong-secret-in-production"

# 开发环境
[env.dev]
name = "scheduler-api-dev"
